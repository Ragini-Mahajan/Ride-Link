<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - Ride Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <!-- Login Card -->
  <div class="w-full max-w-md">
    <!-- Logo Section -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-2">
        <i class="fas fa-bus text-white text-3xl"></i>
        <span class="text-white text-2xl font-bold">Ride Link</span>
      </div>
      <p class="text-white text-opacity-80">Your Daily Commute Partner</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back</h1>
      <p class="text-gray-600 mb-6">Sign in to your account to continue</p>
      
      <!-- Alert -->
      <div id="loginAlert" class="mb-4"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <!-- Email Field -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-envelope mr-2 text-purple-600"></i>Email Address
          </label>
          <input 
            id="loginEmail" 
            type="email" 
            required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="you@example.com"
          >
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock mr-2 text-purple-600"></i>Password
          </label>
          <input 
            id="loginPassword" 
            type="password" 
            required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="Enter your password"
          >
        </div>

        <!-- Forgot Password Link -->
        <div class="text-right mb-6">
          <a href="#" class="text-sm text-purple-600 hover:text-purple-700 font-medium">Forgot password?</a>
        </div>

        <!-- Sign In Button -->
        <button 
          type="button"
          onclick="handleLogin()"
          class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white font-bold py-3 px-4 rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all transform hover:scale-105 active:scale-95 shadow-lg"
        >
          <i class="fas fa-sign-in-alt mr-2"></i>Sign In
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-600">Don't have an account? 
          <a href="/register" class="font-bold text-purple-600 hover:text-purple-700">Create one now</a>
        </p>
      </div>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">or continue as guest</span>
        </div>
      </div>

      <!-- Guest Button -->
      <button 
        type="button"
        onclick="window.location.href='/'"
        class="w-full border-2 border-gray-300 text-gray-700 font-semibold py-3 px-4 rounded-lg hover:bg-gray-50 transition-colors"
      >
        <i class="fas fa-home mr-2"></i>Browse as Guest
      </button>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-white text-opacity-70 text-sm">
      <p>By signing in, you agree to our Terms & Conditions</p>
    </div>
  </div>

  <script>
    async function handleLogin(){
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const alertDiv = document.getElementById('loginAlert');
      alertDiv.innerHTML='';
      try{
        const res = await fetch('/api/auth/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email,password})
        });
        const data = await res.json();
        if(res.ok){
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data));
          alertDiv.innerHTML='<div class="text-green-600">Login successful — redirecting...</div>';
          setTimeout(()=>{ window.location.href = '/dashboard'; }, 800);
        } else {
          alertDiv.innerHTML=`<div class="text-red-600">${data.message || 'Login failed'}</div>`;
        }
      } catch(err){
        alertDiv.innerHTML='<div class="text-red-600">Error connecting to server</div>';
      }
    }
  </script>
</body>
</html>
