<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Ride Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <!-- Register Card -->
  <div class="w-full max-w-md">
    <!-- Logo Section -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-2">
        <i class="fas fa-bus text-white text-3xl"></i>
        <span class="text-white text-2xl font-bold">Ride Link</span>
      </div>
      <p class="text-white text-opacity-80">Join our community</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h1>
      <p class="text-gray-600 mb-6">Sign up to start booking your rides</p>
      
      <!-- Alert -->
      <div id="registerAlert" class="mb-4"></div>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
        <!-- Full Name Field -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-user mr-2 text-purple-600"></i>Full Name
          </label>
          <input 
            id="registerName" 
            type="text" 
            required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="John Doe"
          >
        </div>

        <!-- Email Field -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-envelope mr-2 text-purple-600"></i>Email Address
          </label>
          <input 
            id="registerEmail" 
            type="email" 
            required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="you@example.com"
          >
        </div>

        <!-- Phone Field -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-phone mr-2 text-purple-600"></i>Phone Number
          </label>
          <input 
            id="registerPhone" 
            type="tel" 
            required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="+91 9876543210"
          >
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock mr-2 text-purple-600"></i>Password
          </label>
          <input 
            id="registerPassword" 
            type="password" 
            required 
            minlength="6"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 transition-colors placeholder-gray-400"
            placeholder="Create a strong password (min. 6 characters)"
          >
          <p class="text-xs text-gray-500 mt-1">Password must be at least 6 characters</p>
        </div>

        <!-- Create Account Button -->
        <button 
          type="button"
          onclick="handleRegister()"
          class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white font-bold py-3 px-4 rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all transform hover:scale-105 active:scale-95 shadow-lg"
        >
          <i class="fas fa-user-plus mr-2"></i>Create Account
        </button>
      </form>

      <!-- Sign In Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-600">Already have an account? 
          <a href="/login" class="font-bold text-purple-600 hover:text-purple-700">Sign in here</a>
        </p>
      </div>

      <!-- Terms -->
      <div class="mt-6 text-xs text-gray-500 text-center">
        <p>By creating an account, you agree to our <br class="hidden sm:block">
          <a href="#" class="text-purple-600 hover:text-purple-700">Terms of Service</a> and 
          <a href="#" class="text-purple-600 hover:text-purple-700">Privacy Policy</a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-white text-opacity-70 text-sm">
      <p>© 2024 Ride Link. All rights reserved</p>
    </div>
  </div>

  <script>
    async function handleRegister(){
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const phone = document.getElementById('registerPhone').value;
      const password = document.getElementById('registerPassword').value;
      const alertDiv = document.getElementById('registerAlert');
      alertDiv.innerHTML='';
      try{
        const res = await fetch('/api/auth/register',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({name,email,phone,password})
        });
        const data = await res.json();
        if(res.ok){
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data));
          alertDiv.innerHTML='<div class="text-green-600">Account created — redirecting...</div>';
          setTimeout(()=>{ window.location.href = '/dashboard'; }, 800);
        } else {
          alertDiv.innerHTML=`<div class="text-red-600">${data.message || 'Registration failed'}</div>`;
        }
      } catch(err){
        alertDiv.innerHTML='<div class="text-red-600">Error connecting to server</div>';
      }
    }
  </script>
</body>
</html>
